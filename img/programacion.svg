  <rect x="115" y="88" width="100" height="7" rx="3" fill="#22c55e" opacity="0.9"/>
  <rect x="125" y="104" width="80" height="7" rx="3" fill="#22c55e" opacity="0.7"/>
  <rect x="135" y="120" width="110" height="7" rx="3" fill="#f59e0b" opacity="0.9"/>
  <rect x="125" y="136" width="80" height="7" rx="3" fill="#22c55e" opacity="0.7"/>
  <rect x="115" y="152" width="40" height="7" rx="3" fill="#a855f7" opacity="0.9"/>
  <!-- cursor blink -->
  <rect x="160" y="152" width="3" height="12" fill="#22c55e" opacity="0.9"/>
  <!-- laptop base -->
  <rect x="70" y="195" width="260" height="12" rx="4" fill="#1a1a1a" stroke="#22c55e" stroke-width="1"/>
