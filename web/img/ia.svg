<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000d1a"/>
      <stop offset="100%" style="stop-color:#001a33"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- brain outline -->
  <ellipse cx="200" cy="110" rx="75" ry="60" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <!-- neural network nodes -->
  <circle cx="130" cy="100" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="160" cy="70" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="200" cy="85" r="10" fill="#00d4ff"/>
  <circle cx="240" cy="70" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="270" cy="100" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="160" cy="130" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="200" cy="145" r="10" fill="#00d4ff"/>
  <circle cx="240" cy="130" r="8" fill="#00d4ff" opacity="0.9"/>
  <!-- connections -->
  <line x1="130" y1="100" x2="160" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="100" x2="160" y2="130" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="70" x2="200" y2="85" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="85" x2="240" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="70" x2="270" y2="100" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="270" y1="100" x2="240" y2="130" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="130" x2="200" y2="145" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="145" x2="240" y2="130" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="85" x2="200" y2="145" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="70" x2="160" y2="130" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="70" x2="240" y2="130" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <text x="200" y="225" font-family="Arial" font-size="13" fill="#aaa" text-anchor="middle">Inteligencia Artificial</text>
</svg>
