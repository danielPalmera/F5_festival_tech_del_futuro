<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a001a"/>
      <stop offset="100%" style="stop-color:#1a0030"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- VR headset -->
  <rect x="120" y="80" width="160" height="90" rx="20" fill="#2d1b69"/>
  <rect x="140" y="95" width="55" height="50" rx="12" fill="#00d4ff" opacity="0.7"/>
  <rect x="205" y="95" width="55" height="50" rx="12" fill="#00d4ff" opacity="0.7"/>
  <!-- bridge -->
  <rect x="190" y="108" width="20" height="12" rx="4" fill="#1a0f3d"/>
  <!-- strap -->
  <rect x="100" y="108" width="25" height="10" rx="5" fill="#2d1b69"/>
  <rect x="275" y="108" width="25" height="10" rx="5" fill="#2d1b69"/>
  <!-- lens glare -->
  <circle cx="162" cy="115" r="8" fill="#fff" opacity="0.15"/>
  <circle cx="238" cy="115" r="8" fill="#fff" opacity="0.15"/>
  <!-- stars / virtual world dots -->
  <circle cx="155" cy="55" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="40" r="3" fill="#a855f7" opacity="0.9"/>
  <circle cx="250" cy="50" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="100" cy="160" r="2" fill="#00d4ff" opacity="0.8"/>
  <circle cx="310" cy="155" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="330" cy="60" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="70" cy="80" r="2" fill="#00d4ff" opacity="0.6"/>
  <text x="200" y="225" font-family="Arial" font-size="13" fill="#aaa" text-anchor="middle">Realidad Virtual</text>
</svg>
