<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- robot body -->
  <rect x="150" y="80" width="100" height="90" rx="8" fill="#e94560" opacity="0.9"/>
  <!-- robot head -->
  <rect x="160" y="50" width="80" height="60" rx="6" fill="#0f3460"/>
  <!-- eyes -->
  <circle cx="180" cy="72" r="10" fill="#00d4ff"/>
  <circle cx="220" cy="72" r="10" fill="#00d4ff"/>
  <circle cx="180" cy="72" r="5" fill="#fff"/>
  <circle cx="220" cy="72" r="5" fill="#fff"/>
  <!-- mouth -->
  <rect x="175" y="95" width="50" height="8" rx="4" fill="#00d4ff" opacity="0.8"/>
  <!-- arms -->
  <rect x="110" y="90" width="40" height="15" rx="7" fill="#0f3460"/>
  <rect x="250" y="90" width="40" height="15" rx="7" fill="#0f3460"/>
  <!-- legs -->
  <rect x="165" y="170" width="20" height="40" rx="5" fill="#0f3460"/>
  <rect x="215" y="170" width="20" height="40" rx="5" fill="#0f3460"/>
  <!-- chest details -->
  <rect x="165" y="100" width="70" height="5" rx="2" fill="#00d4ff" opacity="0.6"/>
  <rect x="165" y="115" width="70" height="5" rx="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="200" cy="140" r="12" fill="#e94560" opacity="0.7"/>
  <text x="200" y="230" font-family="Arial" font-size="13" fill="#aaa" text-anchor="middle">Robótica</text>
</svg>
